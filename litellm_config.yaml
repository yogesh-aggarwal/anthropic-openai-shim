include:
  - models.yaml

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_latency_headers: true

router_settings:
  routing_strategy: latency-based-routing
  routing_strategy_args:
    ttl: 300
  retry_policy:
    num_retries: 5
    exponential_backoff_base: 1
    retry_on_status_codes: [429, 500, 502, 503, 504]
  allowed_fails: 3
  cooldown_time: 60
